    <title>Book Now</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: rgba(68, 67, 67, 0.582);
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Perpetua;
        }

        .bookform {

            background-image: linear-gradient(to left, #BDBBBE 0%, #9D9EA3 100%), radial-gradient(88% 271%, rgba(255, 255, 255, 0.25) 0%, rgba(254, 254, 254, 0.25) 1%, rgba(0, 0, 0, 0.25) 100%), radial-gradient(50% 100%, rgba(255, 255, 255, 0.30) 0%, rgba(0, 0, 0, 0.30) 100%);
            background-blend-mode: normal, lighten, soft-light;
            width: 40%;
            padding: 36px;
            margin-top: 40px;
            border: 3px white solid;
            border-radius: 30px;
            box-shadow: 10px 10px 10px white;
        }

        h1 {
            text-align: center;
            margin: 2px;
            text-shadow: 2px 2px 2px rgb(109, 109, 109);
        }

        label {
            font-weight: 600;
            font-size: 23px;
            word-spacing: 5px;
            text-shadow: 2px 2px 2px rgba(76, 75, 75, 0.338);
        }

        input,
        textarea {
            background-color: transparent;
            height: 25px;
            width: 95%;
            border: none;
            border-bottom: 2px black solid;
            color: rgb(205, 203, 203);
            font-size: 18px;
            font-style: italic;
            line-height: 30px;
        }

        input::placeholder,
        textarea::placeholder {
            color: rgba(60, 57, 57, 0.785);
        }

        textarea {
            height: 80px;
            resize: none;
        }

        .button {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 15px;
        }

        button {
            padding: 16px;
            font-family: Perpetua;
            font-size: 23px;
            font-weight: 700;
            border: 2px gray solid;
            border-radius: 60px;
            box-shadow: 7px 7px 5px rgb(46, 46, 46);
            transition: all 0.3s ease;
        }

        button:hover {
            transform: scale(1.03);
            cursor: pointer;
            background-color: rgb(127, 127, 127);
            color: white;
            border: 2px white solid;
        }

        @media screen and (max-width: 576px) {
            .bookform {
                width: 80%;
            }

            label {
                font-size: 18px;
            }

            input,
            textarea {
                font-size: 12px;
            }

            button {
                font-size: 18px;
            }
        }
    </style>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <div class="bookform">
        <h1>Book Your Tour</h1>
        <hr><br><br>
        <form>

            <label>Customer Name(any one)</label><br>
            <input id="name" type="text" placeholder="Enter your name" required><br><br>

            <label>Phone Number</label><br>
            <input id="phone" type="tel" placeholder="Enter your no." required><br><br>

            <label>Pickup Location</label><br>
            <textarea id="pickup" placeholder="Address"></textarea><br><br>

            <label>Destination Place</label><br>
            <input id="destination" type="text" placeholder="Place"><br><br>

            <label>Date and time</label><br>
            <input id="datetime" type="datetime-local"><br><br>

            <label>No. of Customers</label><br>
            <input id="customers" type="number" placeholder="No. of customer" required><br><br>

            <div class="button">
                <button type="button" onclick="sendWhatsApp()">Book Now</button>
            </div>
        </form>
    </div>

    <script>
        function sendWhatsApp() {

            let name = document.getElementById("name").value;
            let phone = document.getElementById("phone").value;
            let pickup = document.getElementById("pickup").value;
            let destination = document.getElementById("destination").value;
            let datetime = document.getElementById("datetime").value;
            let customers = document.getElementById("customers").value;

            let message =
                `*Booking Request*

Name: ${name}
Phone: ${phone}
Pickup Location: ${pickup}
Destination: ${destination}
Date & Time: ${datetime}
No. of Customers: ${customers}`;

            let whatsappURL =
                "https://wa.me/919561455754?text=" +
                encodeURIComponent(message);

            window.open(whatsappURL, "_blank");
        }
    </script>

</body>

</html>
